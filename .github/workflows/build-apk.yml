name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Configure Android SDK path
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > android/local.properties

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Ensure Gradle executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Rename artifact
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/drs-security-ops-debug.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: drs-security-ops-debug-apk
          path: artifacts/drs-security-ops-debug.apk

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: Latest APK Build
          files: artifacts/drs-security-ops-debug.apk
          make_latest: true
